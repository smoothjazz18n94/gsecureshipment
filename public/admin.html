 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Global Secure Shipment</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <header>
    <button onclick="logout()">Logout</button>

<script>
function logout() {
  localStorage.removeItem("isAdmin");
  window.location.href = "login.html";
}
</script>
    <h1>Admin Panel</h1>
  </header>

  <!-- CREATE SHIPMENT -->
  <section>
    <h2>Create Shipment</h2>
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">
    <input id="delivery" placeholder="Delivery Date">
    <input id="cargo" placeholder="Cargo">
    <input id="weight" placeholder="Weight">
    <input id="value" placeholder="Value">
    <button id="createShipmentBtn">Create Shipment</button>
    <div id="createResult" class="result-box"></div>
  </section>

  <!-- UPDATE SHIPMENT -->
  <section>
    <h2>Update Shipment</h2>
    <input id="updateTrackingId" placeholder="Tracking ID">
    <input id="updateStatus" placeholder="Status">
    <input id="updateEvent" placeholder="Event">
    <input id="updateLocation" placeholder="Location">
    <button id="updateShipmentBtn">Update Shipment</button>
    <div id="updateResult" class="result-box"></div>
  </section>

  <!-- USER TRACKING -->
  <section>
    <h2>Track Your Shipment</h2>
    <input type="text" id="trackingInput" placeholder="Enter Tracking ID (e.g. GS-23456-78901)">
    <button id="trackButton">Track</button>
    <div id="trackingResult" class="tracking-container"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
