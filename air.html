<!DOCTYPE html>
<html>
<head>
  <title>Air Freight</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="service-page">
  <h1>Air Freight</h1>
 




  <p>
    Our air freight services ensure fast and secure delivery of goods across
    international destinations.
  </p>

  <ul>
    <li>Import & export forwarding</li>
    <li>Airport customs clearance</li>
    <li>Special cargo handling</li>
  </ul>

  <a href="index.html" class="back-btn">← Back to Home</a>
</section>

<section class="section" id="contact" style="background-color: var(--light-gray);">
        <div class="container">
            <div class="section-title">
                <h2>Request a Quote</h2>
                
            </div>
            
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="company">Company (Optional)</label>
                        <input type="text" id="company" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">How can we help you?</label>
                        <textarea id="message" class="form-control" required></textarea>
                    </div>
                    
                    <button type="submit" class="cta-button" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("Cgew6Dfi7-S9bFwSc");
})();

document.getElementById("quoteForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const result = document.getElementById("quoteResult");

  const params = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    cargo: document.getElementById("cargo").value,
    weight: document.getElementById("weight").value,
    message: document.getElementById("message").value
  };

  try {
    await emailjs.send("service_8yod6gi", "YOUR_TEMPLATE_ID", params);

    result.style.color = "green";
    result.innerText = "Quote request sent successfully!";
    document.getElementById("quoteForm").reset();
  } catch (err) {
    console.error(err);
    result.style.color = "red";
    result.innerText = "Failed to send request";
  }
});
</script>
</body>
</html>
